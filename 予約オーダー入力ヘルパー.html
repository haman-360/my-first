<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予約オーダー入力ヘルパー</title>
<style>
  :root {
    --blue:    #2563eb;
    --blue-lt: #dbeafe;
    --blue-dk: #1e40af;
    --green:   #16a34a;
    --green-lt:#dcfce7;
    --red:     #dc2626;
    --gray:    #64748b;
    --bg:      #f1f5f9;
    --white:   #ffffff;
    --border:  #e2e8f0;
    --text:    #0f172a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 16px;
    max-width: 720px;
    margin: 0 auto;
  }

  header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
  header h1 { font-size: 17px; color: var(--blue-dk); }
  header span { font-size: 11px; color: var(--gray); }

  .date-row {
    background: var(--white); border-radius: 10px; padding: 11px 14px;
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .date-row label { font-size: 12px; font-weight: bold; color: var(--blue-dk); white-space: nowrap; }
  .date-row input[type="date"] {
    border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 8px; font-size: 13px; font-family: inherit; color: var(--text);
  }
  .date-row input[type="date"]:focus { outline: none; border-color: var(--blue); }

  /* 患者カード */
  .patient-card {
    background: var(--white); border-radius: 10px; padding: 12px 14px;
    margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    border-left: 3px solid var(--blue);
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:none; } }

  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .card-num { font-size: 11px; font-weight: bold; color: var(--blue); background: var(--blue-lt); padding: 2px 8px; border-radius: 20px; }
  .btn-remove { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 16px; padding: 2px 5px; border-radius: 4px; }
  .btn-remove:hover { background: #fee2e2; color: var(--red); }

  .field-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .field-row label { font-size: 11px; color: var(--gray); display: block; margin-bottom: 3px; }
  .field-id   { flex: 0 0 100px; }
  .field-age  { flex: 0 0 88px; }
  .field-time { flex: 0 0 80px; }

  input[type="text"], input[type="time"] {
    width: 100%; border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 8px; font-size: 13px; font-family: inherit; color: var(--text);
  }
  input[type="text"]:focus, input[type="time"]:focus {
    outline: none; border-color: var(--blue); box-shadow: 0 0 0 2px rgba(37,99,235,0.15);
  }

  /* ワクチン + 健診グリッド（4列） */
  .vac-section-label { font-size: 11px; color: var(--gray); margin-bottom: 5px; }
  .vac-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
    margin-bottom: 8px;
  }
  @media (max-width: 480px) {
    .vac-grid { grid-template-columns: repeat(2, 1fr); }
    .field-row { gap: 6px; }
    .field-id, .field-age, .field-time { flex: 0 0 calc(50% - 4px); }
  }

  .vac-item {
    display: flex; flex-direction: column; gap: 3px;
    background: var(--bg); border-radius: 7px; padding: 6px 7px;
    border: 1.5px solid transparent; transition: border-color 0.12s, background 0.12s;
  }
  .vac-item.active { background: var(--blue-lt); border-color: var(--blue); }
  .vac-name { font-size: 11px; line-height: 1.3; min-height: 28px; display: flex; align-items: center; }
  .vac-select {
    width: 100%; border: 1px solid var(--border); border-radius: 4px;
    padding: 3px 2px; font-size: 11px; font-family: inherit; background: white;
  }
  .vac-item.active .vac-select { border-color: var(--blue); }

  /* 健診チェックボックス */
  .kensin-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg); border-radius: 7px; padding: 7px 10px;
    border: 1.5px solid transparent; transition: border-color 0.12s, background 0.12s;
    cursor: pointer;
  }
  .kensin-row.active { background: var(--green-lt); border-color: var(--green); }
  .kensin-row input[type="checkbox"] { width: 17px; height: 17px; cursor: pointer; accent-color: var(--green); }
  .kensin-row label { font-size: 13px; font-weight: bold; color: var(--green); cursor: pointer; }

  /* ボタン */
  .btn-add {
    width: 100%; padding: 9px; background: white; color: var(--blue);
    border: 2px dashed var(--blue); border-radius: 8px; font-size: 13px;
    font-weight: bold; cursor: pointer; margin-bottom: 12px; transition: background 0.15s;
    font-family: inherit;
  }
  .btn-add:hover { background: var(--blue-lt); }
  .btn-convert {
    width: 100%; padding: 12px; background: var(--blue); color: white; border: none;
    border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer;
    margin-bottom: 10px; transition: background 0.15s; font-family: inherit;
  }
  .btn-convert:hover { background: var(--blue-dk); }

  /* 結果 */
  .result-card { background: var(--white); border-radius: 10px; padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 10px; }
  .result-title { font-size: 11px; font-weight: bold; color: var(--blue-dk); margin-bottom: 8px; letter-spacing: 0.05em; }
  .preview-wrap { overflow-x: auto; margin-bottom: 10px; }
  table { border-collapse: collapse; font-size: 11px; width: 100%; min-width: 420px; }
  thead tr { background: var(--blue); color: white; }
  thead th { padding: 5px 8px; text-align: left; white-space: nowrap; }
  tbody tr:nth-child(even) { background: var(--blue-lt); }
  tbody td { padding: 5px 8px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .tsv-box {
    background: #0f172a; color: #7dd3fc; border-radius: 6px; padding: 10px 12px;
    font-family: 'Courier New', monospace; font-size: 11px; line-height: 1.6;
    white-space: pre; overflow-x: auto; margin-bottom: 8px;
  }
  .btn-row { display: flex; gap: 8px; align-items: center; }
  .btn-copy { flex: 1; padding: 9px; background: var(--green); color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; font-family: inherit; }
  .btn-copy:hover { background: #15803d; }
  .btn-clear { padding: 9px 14px; background: var(--bg); color: var(--gray); border: 1px solid var(--border); border-radius: 6px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .copied { font-size: 12px; color: var(--green); font-weight: bold; opacity: 0; transition: opacity 0.3s; }
  .copied.show { opacity: 1; }
  .hint { font-size: 11px; color: var(--gray); margin-top: 6px; line-height: 1.5; }
</style>
</head>
<body>

<header>
  <h1>📋 予約オーダー入力ヘルパー</h1>
  <span>患者を追加してスプレッドシート用に変換</span>
</header>

<div class="date-row">
  <label>接種日：</label>
  <input type="date" id="target-date">
</div>

<div id="patient-list"></div>

<button class="btn-add" onclick="addPatient()">＋ 患者を追加</button>
<button class="btn-convert" onclick="convert()">🔄 変換してコピー用テキストを作成</button>

<div id="result-section" style="display:none;">
  <div class="result-card">
    <div class="result-title">変換結果（確認）</div>
    <div class="preview-wrap">
      <table>
        <thead><tr><th>日付</th><th>時刻</th><th>患者ID</th><th>年齢</th><th>接種内容</th></tr></thead>
        <tbody id="preview-tbody"></tbody>
      </table>
    </div>
  </div>
  <div class="result-card">
    <div class="result-title">スプレッドシートに貼り付け用（タブ区切り）</div>
    <div class="tsv-box" id="tsv-box"></div>
    <div class="btn-row">
      <button class="btn-copy" onclick="copyTSV()">📋 コピーする</button>
      <button class="btn-clear" onclick="clearAll()">クリア</button>
      <span class="copied" id="copied-badge">✅ コピーしました</span>
    </div>
    <p class="hint">コピー後、予約一覧の空行の先頭セルをクリックして Cmd+V で貼り付け。<br>健診列（最終列）は TRUE が入ります。</p>
  </div>
</div>

<script>
const VACCINES = [
  'ロタテック','肺炎球菌','B型肝炎 0.25','B型肝炎 0.5',
  '五種混合','おたふく','麻しん風しん','水痘',
  '日本脳炎','エンセバック','二種混合','三種混合','シルガード','バクニュバンス'
];
const CHOICES = ['接種なし','1回目','2回目','3回目','4回目'];

let patientCount = 0;
let tsvText = '';

// デフォルト日付：2日後
(function() {
  var d = new Date(); d.setDate(d.getDate() + 2);
  document.getElementById('target-date').value = d.toISOString().slice(0,10);
})();

function addPatient() {
  patientCount++;
  var pid = 'p' + patientCount;
  var div = document.createElement('div');
  div.className = 'patient-card';
  div.id = pid;

  // ワクチングリッド（4列）
  var vacGrid = VACCINES.map(function(v, i) {
    return '<div class="vac-item" id="vi_'+pid+'_'+i+'">' +
      '<span class="vac-name">'+v+'</span>' +
      '<select class="vac-select" onchange="onVacChange(\''+pid+'\','+i+',this.value)">' +
      CHOICES.map(function(c){ return '<option>'+c+'</option>'; }).join('') +
      '</select></div>';
  }).join('');

  div.innerHTML =
    '<div class="card-header">' +
      '<span class="card-num">患者 '+patientCount+' 人目</span>' +
      '<button class="btn-remove" onclick="removePatient(\''+pid+'\')" title="削除">✕</button>' +
    '</div>' +
    '<div class="field-row">' +
      '<div class="field-id"><label>患者ID</label><input type="text" id="id_'+pid+'" placeholder="09503" inputmode="numeric"></div>' +
      '<div class="field-age"><label>年齢</label><input type="text" id="age_'+pid+'" placeholder="1y7m"></div>' +
      '<div class="field-time"><label>予約時刻</label><input type="time" id="time_'+pid+'" value="09:00"></div>' +
    '</div>' +
    '<div class="vac-section-label">ワクチン（回数を選択）</div>' +
    '<div class="vac-grid">'+vacGrid+'</div>' +
    '<div class="kensin-row" id="kr_'+pid+'" onclick="toggleKensin(\''+pid+'\')">' +
      '<input type="checkbox" id="kensin_'+pid+'" onclick="event.stopPropagation();onKensinChange(\''+pid+'\')">' +
      '<label for="kensin_'+pid+'">🏥 10か月健診あり</label>' +
    '</div>';

  document.getElementById('patient-list').appendChild(div);
}

function onVacChange(pid, idx, val) {
  document.getElementById('vi_'+pid+'_'+idx).classList.toggle('active', val !== '接種なし');
}

function toggleKensin(pid) {
  var cb = document.getElementById('kensin_'+pid);
  cb.checked = !cb.checked;
  onKensinChange(pid);
}
function onKensinChange(pid) {
  var cb = document.getElementById('kensin_'+pid);
  document.getElementById('kr_'+pid).classList.toggle('active', cb.checked);
}

function removePatient(pid) {
  var el = document.getElementById(pid); if (el) el.remove();
}

function getDateStr() {
  var val = document.getElementById('target-date').value;
  if (!val) return '';
  var p = val.split('-');
  return p[0]+'/'+p[1]+'/'+p[2];
}

function convert() {
  var dateStr = getDateStr();
  if (!dateStr) { alert('接種日を選択してください'); return; }
  var cards = document.querySelectorAll('.patient-card');
  if (cards.length === 0) { alert('患者を追加してください'); return; }

  var patients = [];
  var ok = true;

  cards.forEach(function(card) {
    var pid   = card.id;
    var patId = document.getElementById('id_'+pid).value.trim();
    var age   = document.getElementById('age_'+pid).value.trim();
    var time  = document.getElementById('time_'+pid).value.trim();
    var kensin = document.getElementById('kensin_'+pid).checked;

    if (!patId) { alert('患者IDが空の行があります'); ok = false; return; }

    var vaccines = {};
    VACCINES.forEach(function(v, i) {
      var sel = document.querySelector('#vi_'+pid+'_'+i+' select');
      if (sel && sel.value !== '接種なし') vaccines[v] = parseInt(sel.value);
    });

    patients.push({ date: dateStr, time: time, id: patId, age: age, vaccines: vaccines, kensin: kensin });
  });

  if (!ok || patients.length === 0) return;

  // プレビュー
  var tbody = document.getElementById('preview-tbody');
  tbody.innerHTML = '';
  patients.forEach(function(p) {
    var vList = Object.keys(p.vaccines).map(function(v){ return v+':'+p.vaccines[v]+'回目'; });
    if (p.kensin) vList.push('（健診）');
    var tr = document.createElement('tr');
    tr.innerHTML = '<td>'+p.date+'</td><td>'+p.time+'</td><td>'+p.id+'</td><td>'+(p.age||'-')+'</td><td>'+(vList.join('、')||'（なし）')+'</td>';
    tbody.appendChild(tr);
  });

  // TSV: 日付/時刻/ID/年齢/[ワクチン×14]/健診
  var lines = patients.map(function(p) {
    var cols = new Array(4 + VACCINES.length + 1).fill('');
    cols[0] = p.date; cols[1] = p.time; cols[2] = p.id; cols[3] = p.age;
    Object.keys(p.vaccines).forEach(function(v) {
      var idx = VACCINES.indexOf(v);
      if (idx >= 0) cols[4+idx] = String(p.vaccines[v]);
    });
    cols[4 + VACCINES.length] = p.kensin ? 'TRUE' : '';
    return cols.join('\t');
  });
  tsvText = lines.join('\n');

  document.getElementById('tsv-box').textContent = tsvText;
  document.getElementById('result-section').style.display = 'block';
  document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
}

function copyTSV() {
  if (!tsvText) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(tsvText).then(showCopied).catch(function(){ fallbackCopy(tsvText); });
  } else { fallbackCopy(tsvText); }
}
function fallbackCopy(text) {
  var ta = document.createElement('textarea'); ta.value = text;
  document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  showCopied();
}
function showCopied() {
  var badge = document.getElementById('copied-badge'); badge.classList.add('show');
  setTimeout(function(){ badge.classList.remove('show'); }, 2000);
}
function clearAll() {
  document.getElementById('patient-list').innerHTML = '';
  document.getElementById('result-section').style.display = 'none';
  patientCount = 0; tsvText = '';
}

addPatient();
</script>
</body>
</html>
