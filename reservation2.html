<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予約オーダー入力</title>
<style>
  :root {
    --blue:    #2563eb;
    --blue-lt: #dbeafe;
    --blue-dk: #1e40af;
    --green:   #16a34a;
    --green-lt:#dcfce7;
    --red:     #dc2626;
    --amber:   #d97706;
    --amber-lt:#fef3c7;
    --gray:    #64748b;
    --bg:      #f1f5f9;
    --white:   #ffffff;
    --border:  #e2e8f0;
    --text:    #0f172a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 16px;
    max-width: 720px; margin: 0 auto;
  }

  .setup-card {
    background: var(--amber-lt); border-radius: 10px; padding: 12px 14px;
    margin-bottom: 14px; border: 1.5px solid #fcd34d;
  }
  .setup-card label { font-size: 11px; font-weight: bold; color: var(--amber); display: block; margin-bottom: 5px; }
  .setup-card input {
    width: 100%; border: 1px solid #fcd34d; border-radius: 6px;
    padding: 6px 8px; font-size: 12px; font-family: 'Courier New', monospace;
    background: white; color: var(--text);
  }
  .setup-card p { font-size: 10px; color: var(--amber); margin-top: 4px; }

  header h1 { font-size: 17px; color: var(--blue-dk); margin-bottom: 3px; }
  header p  { font-size: 11px; color: var(--gray); margin-bottom: 14px; }

  .date-row {
    background: var(--white); border-radius: 10px; padding: 11px 14px;
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .date-row label { font-size: 12px; font-weight: bold; color: var(--blue-dk); white-space: nowrap; }
  .date-row input[type="date"] {
    border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 8px; font-size: 13px; font-family: inherit;
  }

  /* 患者カード */
  .patient-card {
    background: var(--white); border-radius: 10px; padding: 12px 14px;
    margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    border-left: 3px solid var(--blue);
    animation: fadeIn 0.18s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .card-num { font-size: 11px; font-weight: bold; color: var(--blue); background: var(--blue-lt); padding: 2px 8px; border-radius: 20px; }
  .btn-remove { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 16px; padding: 2px 5px; border-radius: 4px; }
  .btn-remove:hover { background: #fee2e2; color: var(--red); }

  .field-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .field-row label { font-size: 11px; color: var(--gray); display: block; margin-bottom: 3px; }
  .field-id   { flex: 0 0 110px; }
  .field-age  { flex: 0 0 90px; }
  .field-time { flex: 0 0 85px; }
  input[type="text"], input[type="time"] {
    width: 100%; border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 8px; font-size: 13px; font-family: inherit;
  }
  input[type="text"]:focus, input[type="time"]:focus {
    outline: none; border-color: var(--blue); box-shadow: 0 0 0 2px rgba(37,99,235,0.15);
  }

  /* ワクチングリッド */
  .vac-section-label { font-size: 11px; color: var(--gray); margin-bottom: 5px; }
  .vac-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 8px;
  }
  @media (max-width: 480px) {
    .vac-grid { grid-template-columns: repeat(2, 1fr); }
    .field-id, .field-age, .field-time { flex: 0 0 calc(50% - 4px); }
  }

  .vac-item {
    display: flex; flex-direction: column; gap: 3px;
    background: var(--bg); border-radius: 7px; padding: 6px 7px;
    border: 1.5px solid transparent; transition: border-color 0.12s, background 0.12s;
  }
  .vac-item.active { background: var(--blue-lt); border-color: var(--blue); }
  .vac-name { font-size: 11px; line-height: 1.3; min-height: 28px; display: flex; align-items: center; }
  .vac-select {
    width: 100%; border: 1px solid var(--border); border-radius: 4px;
    padding: 3px 2px; font-size: 11px; font-family: inherit; background: white;
  }
  .vac-item.active .vac-select { border-color: var(--blue); }

  /* 健診 */
  .kensin-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg); border-radius: 7px; padding: 7px 10px;
    border: 1.5px solid transparent; cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
  }
  .kensin-row.active { background: var(--green-lt); border-color: var(--green); }
  .kensin-row input[type="checkbox"] { width: 17px; height: 17px; accent-color: var(--green); cursor: pointer; }
  .kensin-row label { font-size: 13px; font-weight: bold; color: var(--green); cursor: pointer; }

  .btn-add {
    width: 100%; padding: 9px; background: white; color: var(--blue);
    border: 2px dashed var(--blue); border-radius: 8px; font-size: 13px;
    font-weight: bold; cursor: pointer; margin-bottom: 12px;
    font-family: inherit; transition: background 0.15s;
  }
  .btn-add:hover { background: var(--blue-lt); }

  .btn-submit {
    width: 100%; padding: 14px; background: var(--blue); color: white; border: none;
    border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer;
    font-family: inherit; transition: background 0.15s; margin-bottom: 12px;
  }
  .btn-submit:hover { background: var(--blue-dk); }
  .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }

  /* 結果 */
  .result-card { border-radius: 10px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); display: none; }
  .result-card.success { background: var(--green-lt); border: 1.5px solid #86efac; }
  .result-card.error   { background: #fee2e2; border: 1.5px solid #fca5a5; }
  .result-title { font-size: 13px; font-weight: bold; margin-bottom: 6px; }
  .result-body  { font-size: 12px; line-height: 1.8; }

  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
    border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="setup-card" style="display:none">
  <label>⚙️ Apps Script Web API URL（最初に1回設定してください）</label>
  <input type="text" id="api-url" placeholder="https://script.google.com/macros/s/..." oninput="saveUrl()">
  <p>URLはブラウザに保存されます。一度設定すれば次回以降は不要です。</p>
</div>

<header>
  <h1>📋 予約オーダー入力</h1>
  <p>患者を追加して「登録する」を押すとスプレッドシートに直接保存されます。</p>
</header>

<div class="date-row">
  <label>接種日：</label>
  <input type="date" id="target-date">
</div>

<div id="patient-list"></div>

<button class="btn-add" onclick="addPatient()">＋ 患者を追加</button>
<button class="btn-submit" id="btn-submit" onclick="confirmSubmit()">📋 スプレッドシートに登録する</button>

</div>

<div class="result-card success" id="result-ok">
  <div class="result-title">✅ 登録完了</div>
  <div class="result-body" id="result-ok-body"></div>
</div>
<div class="result-card error" id="result-err">
  <div class="result-title">❌ エラー</div>
  <div class="result-body" id="result-err-body"></div>
</div>

<script>
const VACCINES = [
  'ロタテック','肺炎球菌','B型肝炎 0.25','B型肝炎 0.5',
  '五種混合','おたふく','麻しん風しん','水痘',
  '日本脳炎','エンセバック','二種混合','三種混合','シルガード','バクニュバンス'
];
const CHOICES = ['接種なし','1回目','2回目','3回目','4回目'];

let patientCount = 0;

(function init() {
  var saved = 'https://script.google.com/macros/s/AKfycbwokDeNLYlqYaSEi_te2X-U9k5g9IPCVtkuvLOZbLSINZ1VeUVUK25WJh_ayglvW08azA/exec';
  document.getElementById('api-url').value = saved;
  var d = new Date(); d.setDate(d.getDate() + 2);
  document.getElementById('target-date').value = d.toISOString().slice(0,10);
  addPatient();
})();

function saveUrl() {
  // Apps ScriptではlocalStorageは使用不可
}

function addPatient() {
  patientCount++;
  var pid = 'p' + patientCount;
  var div = document.createElement('div');
  div.className = 'patient-card'; div.id = pid;

  var vacGrid = VACCINES.map(function(v, i) {
    return '<div class="vac-item" id="vi_'+pid+'_'+i+'">' +
      '<span class="vac-name">'+v+'</span>' +
      '<select class="vac-select" onchange="onVacChange(\''+pid+'\','+i+',this.value)">' +
      CHOICES.map(function(c){ return '<option>'+c+'</option>'; }).join('') +
      '</select></div>';
  }).join('');

  div.innerHTML =
    '<div class="card-header">' +
      '<span class="card-num">患者 '+patientCount+' 人目</span>' +
      '<button class="btn-remove" onclick="removePatient(\''+pid+'\')">\u2715</button>' +
    '</div>' +
    '<div class="field-row">' +
      '<div class="field-id"><label>患者ID</label><input type="text" id="id_'+pid+'" placeholder="09503" inputmode="numeric"></div>' +
      '<div class="field-age"><label>年齢</label><input type="text" id="age_'+pid+'" placeholder="1y7m"></div>' +
      '<div class="field-time"><label>予約時刻</label><input type="time" id="time_'+pid+'" value="09:00"></div>' +
    '</div>' +
    '<div class="vac-section-label">ワクチン（回数を選択）</div>' +
    '<div class="vac-grid">'+vacGrid+'</div>' +
    '<div class="kensin-row" id="kr_'+pid+'" onclick="toggleKensin(\''+pid+'\')">' +
      '<input type="checkbox" id="kensin_'+pid+'" onclick="event.stopPropagation();onKensinChange(\''+pid+'\')">' +
      '<label for="kensin_'+pid+'">\ud83c\udfe5 10か月健診あり</label>' +
    '</div>';

  document.getElementById('patient-list').appendChild(div);
  setTimeout(function(){ document.getElementById('id_'+pid).focus(); }, 50);
}

function onVacChange(pid, idx, val) {
  document.getElementById('vi_'+pid+'_'+idx).classList.toggle('active', val !== '接種なし');
}
function toggleKensin(pid) {
  var cb = document.getElementById('kensin_'+pid); cb.checked = !cb.checked; onKensinChange(pid);
}
function onKensinChange(pid) {
  document.getElementById('kr_'+pid).classList.toggle('active', document.getElementById('kensin_'+pid).checked);
}
function removePatient(pid) {
  var el = document.getElementById(pid); if (el) el.remove();
}

function getDateStr() {
  var val = document.getElementById('target-date').value;
  if (!val) return '';
  var p = val.split('-');
  return p[0]+'/'+p[1]+'/'+p[2];
}

function confirmSubmit() {
  var apiUrl = document.getElementById('api-url').value.trim();
  if (!apiUrl) { showError('API URLが設定されていません'); return; }

  var dateStr = getDateStr();
  if (!dateStr) { showError('接種日を選択してください'); return; }

  var cards = document.querySelectorAll('.patient-card');
  if (cards.length === 0) { showError('患者を追加してください'); return; }

  var rows = [];
  var ok = true;
  cards.forEach(function(card) {
    var pid   = card.id;
    var patId = document.getElementById('id_'+pid).value.trim();
    if (!patId) { showError('患者IDが空の行があります'); ok = false; return; }

    var vaccines = {};
    VACCINES.forEach(function(v, i) {
      var sel = document.querySelector('#vi_'+pid+'_'+i+' select');
      if (sel && sel.value !== '接種なし') vaccines[v] = parseInt(sel.value);
    });
    var kensin = document.getElementById('kensin_'+pid).checked;

    if (Object.keys(vaccines).length === 0 && !kensin) {
      showError('ID '+patId+' のワクチンも健診も選択されていません'); ok = false; return;
    }

    rows.push({
      date: dateStr,
      time: document.getElementById('time_'+pid).value,
      id: patId,
      age: document.getElementById('age_'+pid).value.trim(),
      vaccines: vaccines,
      kensin: kensin
    });
  });

  if (!ok || rows.length === 0) return;

  // 確認メッセージ
  var lines = ['接種日：' + dateStr, '患者数：' + rows.length + '人', ''];
  rows.forEach(function(r) {
    lines.push('患者ID：' + r.id + (r.age ? '  年齢：' + r.age : ''));
    var vacList = Object.keys(r.vaccines).map(function(v) { return v + ' ' + r.vaccines[v] + '回目'; });
    if (vacList.length > 0) lines.push('  ワクチン：' + vacList.join('、'));
    if (r.kensin) lines.push('  健診：あり');
  });
  lines.push('', '登録しますか？');

  if (!window.confirm(lines.join('\n'))) return;

  hideAll();
  var btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.innerHTML = '登録中...';

  fetch(apiUrl, {
    method: 'POST',
    body: JSON.stringify({ action: 'reservation', rows: rows }),
    headers: { 'Content-Type': 'text/plain' }
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    btn.disabled = false;
    btn.innerHTML = '📋 スプレッドシートに登録する';
    if (data.ok) {
      document.getElementById('result-ok').style.display = 'block';
      document.getElementById('result-ok-body').textContent =
        data.message + '\n\n接種日：' + dateStr + '\n患者数：' + rows.length + '人';
      document.getElementById('patient-list').innerHTML = '';
      patientCount = 0;
    } else {
      showError(data.message);
    }
  })
  .catch(function(err) {
    btn.disabled = false;
    btn.innerHTML = '📋 スプレッドシートに登録する';
    showError('通信エラー：' + err.message);
  });
}

function showError(msg) {
  document.getElementById('result-err').style.display = 'block';
  document.getElementById('result-err-body').textContent = msg;
}
function hideAll() {
  document.getElementById('result-ok').style.display = 'none';
  document.getElementById('result-err').style.display = 'none';
}
</script>
</body>
</html>
